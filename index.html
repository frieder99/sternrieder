<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sternrieder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      min-height: 100vh;
      background-color: #f7f3ed;
      background-image: url("maori.png");
      background-repeat: repeat;
      background-size: 7vw auto;
      overflow-x: hidden;
    }

    .element {
      position: absolute;
      cursor: grab;
      user-select: none;
    }
    .element:active { cursor: grabbing; }
    .element img {
      display: block;
      max-width: 100%;
      pointer-events: none;
    }
  </style>
</head>
<body>



    <div id="startbtn" onclick="document.getElementById('startbtn').style.display='none'" 
    style="position:fixed;top:0;left:0;width:100%;height:100%;
    background:rgba(247,243,237,0.92);display:flex;align-items:center;
    justify-content:center;z-index:9999;cursor:pointer;
    font-family:Georgia,serif;font-size:1.2rem;letter-spacing:0.2em;color:#8a8278;">
      ✦ &nbsp; klick zum starten
    </div>

  <!-- OHNE Sound -->
  <a class="element" href="#" style="left:200px; top:150px; width:120px;"
    data-sound="sounds/cynthia_encounter.mp3">
    <img src="bilder/trainer115.png" alt=""/>
  </a>

  <!-- MIT Sound — data-sound="pfad/zur/audiodatei.mp3" -->
  <!--
  <a class="element" href="#" style="left:400px; top:200px; width:150px;"
     data-sound="bilder/mein-sound.mp3">
    <img src="bilder/mein-bild.png" alt=""/>
  </a>
  -->

  <script>
    document.querySelectorAll('.element').forEach(el => {
      let dragging = false, ox = 0, oy = 0, moved = false;

      // Sound setup — nur wenn data-sound vorhanden
      let audio = null;
      if (el.dataset.sound) {
        audio = new Audio(el.dataset.sound);
        audio.loop = true; // läuft durch solange gezogen wird
      }

      el.addEventListener('mousedown', e => {
        dragging = true;
        moved = false;
        ox = e.clientX - el.offsetLeft;
        oy = e.clientY - el.offsetTop;
        el.style.zIndex = 1000;
        e.preventDefault();
      });

      document.addEventListener('mousemove', e => {
        if (!dragging) return;
        moved = true;
        el.style.left = (e.clientX - ox) + 'px';
        el.style.top  = (e.clientY - oy) + 'px';

        // Sound starten sobald man wirklich zieht
        if (audio && audio.paused) audio.play();
      });

      document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        el.style.zIndex = '';

        // Sound stoppen wenn losgelassen
        if (audio) {
          audio.pause();
          audio.currentTime = 0;
        }
      });

      // Link nur öffnen wenn nicht gezogen
      el.addEventListener('click', e => {
        if (moved) e.preventDefault();
      });
    });
  </script>

</body>
</html>

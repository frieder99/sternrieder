<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sternrieder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      min-height: 100vh;
      background-color: #f7f3ed;
      background-image: url("maori.png");
      background-repeat: repeat;
      background-size: 7vw auto;
      overflow-x: hidden;
    }

    .element {
      position: absolute;
      cursor: grab;
      user-select: none;
    }
    .element:active { cursor: grabbing; }
    .element img {
      display: block;
      max-width: 100%;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- STARTSCREEN — fixed, über allem, verschwindet nach Klick -->
  <div id="startbtn"
    onclick="this.style.display='none'"
    style="position:fixed;top:0;left:0;width:100%;height:100%;
    background:#f7f3ed;
    background-image:url('maori.png');
    background-repeat:repeat;
    background-size:7vw auto;
    display:flex;align-items:center;justify-content:center;
    z-index:9999;cursor:pointer;
    font-family:Georgia,serif;font-size:1.2rem;
    letter-spacing:0.2em;color:#8a8278;">
    ✦ &nbsp; klick zum starten
  </div>

  <!-- WELT LAYER — alles was scrollt kommt hier rein -->
  <div id="welt" style="position:fixed;inset:0;pointer-events:none;z-index:5;">

    <!-- Sonne — startet rechts außen -->
    <img id="sonne" src="bilder/sonne.png"
         style="position:absolute;top:60px;width:120px;pointer-events:none;"/>

    <!-- Flowers — mehrere werden per JS gespawnt -->
    <div id="flowersContainer"></div>

  </div>

  <!-- SVG PFAD — der weiße Weg -->
  <svg id="pathSvg"
       style="position:fixed;inset:0;width:100%;height:100%;
              pointer-events:none;z-index:6;">
    <path id="pathLine"
          fill="none"
          stroke="white"
          stroke-width="22"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </svg>

  <!-- FIGUR -->
  <a class="element" href="#"
     style="left:200px;top:150px;width:120px;z-index:100;"
     data-sound="sounds/cynthia_encounter.mp3">
    <img src="bilder/trainer115.png" alt=""/>
  </a>

  <script>
    const W = window.innerWidth;
    const H = window.innerHeight;
    const pathMidY = H * 0.7; // Höhe auf der der Weg verläuft

    // ---- WEISSER WEG ----
    // Pfad-Punkte: starten von Mitte nach rechts außen
    // x-Werte: von W/2 bis W+200
    let pathOffsetX = 0; // wie weit hat sich die Welt nach links bewegt

    function buildPathD(offset) {
      // Fixierter rechter Teil: Mitte → rechts (bleibt immer gleich)
      // Wachsender linker Teil: wächst nach links je mehr offset
      const points = [];

      // Linker Teil — wächst mit offset
      const leftEnd = Math.max(-200, W/2 - offset);
      for (let x = leftEnd; x <= W/2; x += 20) {
        // leichte Welle für natürlichen Pfad
        const wave = Math.sin(x * 0.02) * 8;
        points.push({ x, y: pathMidY + wave });
      }

      // Rechter Teil — immer da, von Mitte nach rechts außen
      for (let x = W/2; x <= W + 200; x += 20) {
        const wave = Math.sin(x * 0.02) * 8;
        points.push({ x, y: pathMidY + wave });
      }

      if (points.length < 2) return '';
      let d = `M ${points[0].x} ${points[0].y}`;
      for (let i = 1; i < points.length; i++) {
        d += ` L ${points[i].x} ${points[i].y}`;
      }
      return d;
    }

    // Pfad sofort beim Laden zeichnen
    document.getElementById('pathLine').setAttribute('d', buildPathD(0));

    // ---- SONNE ----
    let sonneX = W + 50; // startet rechts außen
    document.getElementById('sonne').style.left = sonneX + 'px';

    // ---- FLOWERS ----
    let flowersList = [];
    const flowersContainer = document.getElementById('flowersContainer');

    function spawnFlower() {
      const img = document.createElement('img');
      img.src = 'bilder/Flowers1.png';
      const topPos = Math.random() * (H * 0.5) + H * 0.1;
      const size = 100 + Math.random() * 80;
      img.style.cssText = `position:absolute;width:${size}px;
        top:${topPos}px;pointer-events:none;`;
      const startX = W + 100;
      img.style.left = startX + 'px';
      flowersContainer.appendChild(img);
      flowersList.push({ el: img, x: startX });
    }

    // Erste Blume sofort spawnen
    spawnFlower();

    // ---- ANIMATION LOOP ----
    let holding    = false;
    let speed      = 0;      // aktuelle Scroll-Geschwindigkeit
    const maxSpeed = 4;      // maximale Geschwindigkeit
    const accel    = 0.08;   // wie schnell beschleunigt es
    const decel    = 0.05;   // wie schnell bremst es ab

    function animate() {
      if (holding) {
        // Beschleunigen
        speed = Math.min(speed + accel, maxSpeed);
      } else {
        // Abbremsen
        speed = Math.max(speed - decel, 0);
      }

      if (speed > 0) {
        // Welt nach links scrollen
        pathOffsetX += speed;

        // Pfad aktualisieren
        document.getElementById('pathLine')
                .setAttribute('d', buildPathD(pathOffsetX));

        // Sonne langsam (0.2x)
        sonneX -= speed * 0.2;
        document.getElementById('sonne').style.left = sonneX + 'px';
        // Sonne rechts wieder reinkommen wenn sie links raus ist
        if (sonneX < -150) sonneX = W + 150;

        // Flowers schneller (1.8x)
        flowersList.forEach((f, i) => {
          f.x -= speed * 1.8;
          f.el.style.left = f.x + 'px';

          // Wenn Blume die Mitte erreicht → neue spawnen
          if (f.x < W / 2 && !f.spawned) {
            f.spawned = true;
            spawnFlower();
          }

          // Wenn Blume links raus → entfernen
          if (f.x < -300) {
            f.el.remove();
            flowersList.splice(i, 1);
          }
        });
      }

      requestAnimationFrame(animate);
    }

    animate();

    // ---- FIGUR DRAG ----
    document.querySelectorAll('.element').forEach(el => {
      let dragging = false, ox = 0, oy = 0, moved = false;

      let audio = null;
      if (el.dataset.sound) {
        audio = new Audio(el.dataset.sound);
        audio.loop = true;
      }

      el.addEventListener('mousedown', e => {
        dragging = true;
        moved    = false;
        holding  = true;
        ox = e.clientX - el.offsetLeft;
        oy = e.clientY - el.offsetTop;
        el.style.zIndex = 1000;
        e.preventDefault();
      });

      document.addEventListener('mousemove', e => {
        if (!dragging) return;
        moved = true;
        el.style.left = (e.clientX - ox) + 'px';
        el.style.top  = (e.clientY - oy) + 'px';
        if (audio && audio.paused) audio.play();
      });

      document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        holding  = false;
        el.style.zIndex = '';
        if (audio) { audio.pause(); audio.currentTime = 0; }
      });

      el.addEventListener('click', e => {
        if (moved) e.preventDefault();
      });
    });
  </script>

</body>
</html>
